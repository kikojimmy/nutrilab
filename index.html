<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>НутриЛаб</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0d;--card:#111916;--card2:#162019;--accent:#39e07a;--accent2:#ffcc44;--accent3:#ff6b35;--accent4:#60c5ff;--text:#e8f0eb;--muted:#6a8272;--border:#1f2e25;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{background:linear-gradient(135deg,#0d1a10,#0a150d);padding:28px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:3px;color:var(--accent);line-height:1;}
header p{color:var(--muted);font-size:0.78rem;margin-top:2px;letter-spacing:1px;}
.search-wrap{padding:12px 16px 8px;background:var(--bg);position:sticky;top:88px;z-index:99;}
.search-inner{position:relative;}
.search-inner input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px 12px 42px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color .2s;}
.search-inner input::placeholder{color:var(--muted);}
.search-inner input:focus{border-color:var(--accent);}
.search-inner span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
.tabs{display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;font-size:0.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0a0f0d;font-weight:600;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 100px;}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px 14px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;}
.card.vitamin::before{background:var(--accent);}
.card.mineral::before{background:var(--accent2);}
.card.acid::before{background:var(--accent3);}
.card:active{transform:scale(0.96);}
.card-icon{font-size:1.9rem;margin-bottom:8px;}
.card-name{font-weight:600;font-size:0.93rem;}
.card-alias{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;font-size:0.62rem;font-weight:600;letter-spacing:.5px;padding:2px 8px;border-radius:50px;margin-top:8px;text-transform:uppercase;}
.badge.vitamin{background:rgba(57,224,122,.15);color:var(--accent);}
.badge.mineral{background:rgba(255,204,68,.15);color:var(--accent2);}
.badge.acid{background:rgba(255,107,53,.15);color:var(--accent3);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--card2);border-radius:28px 28px 0 0;border-top:1px solid var(--border);max-height:90vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:50px;}
.modal.open{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:14px auto 0;}
.close-btn{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.07);border:none;border-radius:50%;width:34px;height:34px;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-header{padding:18px 22px 0;display:flex;align-items:flex-start;gap:14px;}
.modal-icon{font-size:2.8rem;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;}
.modal-alias{color:var(--muted);font-size:0.8rem;margin-top:4px;}
.modal-body{padding:16px 22px 0;}
.section-label{font-size:0.68rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:18px;}
.info-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px;font-size:0.88rem;line-height:1.65;color:#c5d9ca;}
.organs-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.organ-pill{background:rgba(57,224,122,.1);border:1px solid rgba(57,224,122,.25);border-radius:50px;padding:6px 14px;font-size:0.82rem;color:var(--accent);font-weight:500;}
.organ-pill.min{background:rgba(255,204,68,.1);border-color:rgba(255,204,68,.25);color:var(--accent2);}
.organ-pill.acid{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.25);color:var(--accent3);}
.food-grid{display:flex;flex-wrap:wrap;gap:6px;}
.food-pill{background:rgba(57,224,122,.08);border:1px solid rgba(57,224,122,.2);border-radius:50px;padding:5px 12px;font-size:0.77rem;color:var(--accent);}
.food-pill.min{background:rgba(255,204,68,.08);border-color:rgba(255,204,68,.2);color:var(--accent2);}
.food-pill.acid{background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.2);color:var(--accent3);}
.dose-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:0.84rem;margin-bottom:6px;}
.dose-label{color:var(--muted);flex-shrink:0;}
.dose-val{font-weight:600;text-align:right;font-size:.8rem;margin-left:8px;}
.sym-list{list-style:none;}
.sym-list li{padding:7px 0;border-bottom:1px solid var(--border);font-size:0.84rem;color:#c5d9ca;display:flex;align-items:center;gap:8px;}
.sym-list li:last-child{border-bottom:none;}
.sym-list li::before{content:'gotcha';font-size:.75rem;flex-shrink:0;}
.tip-box{background:rgba(57,224,122,.06);border:1px solid rgba(57,224,122,.15);border-radius:12px;padding:12px 14px;font-size:0.82rem;color:#9dccab;line-height:1.55;margin-top:8px;}
.tip-box.warn{background:rgba(255,107,53,.06);border-color:rgba(255,107,53,.15);color:#d8a090;}
.timing-card{border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid;}
.timing-card.good{background:rgba(57,224,122,.06);border-color:rgba(57,224,122,.2);}
.timing-card.bad{background:rgba(255,80,80,.06);border-color:rgba(255,80,80,.2);}
.timing-card.neutral{background:rgba(96,197,255,.06);border-color:rgba(96,197,255,.2);}
.timing-title{font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.timing-title.good{color:var(--accent);}
.timing-title.bad{color:#ff6060;}
.timing-title.neutral{color:var(--accent4);}
.timing-body{font-size:0.84rem;line-height:1.55;color:#c5d9ca;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
.empty div{font-size:2.5rem;margin-bottom:10px;}
</style>
</head>
<body>
<header>
  <h1>НУТРИЛАБ</h1>
  <p>ВИТАМИНИ · МИНЕРАЛИ · МАСНИ КИСЕЛИНИ</p>
</header>
<div class="search-wrap">
  <div class="search-inner">
    <span>&#128269;</span>
    <input type="text" id="searchInput" placeholder="Пребарај витамин, минерал, храна..." oninput="render()">
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="setTab('all',this)">Сите</div>
  <div class="tab" onclick="setTab('vitamin',this)">Витамини</div>
  <div class="tab" onclick="setTab('mineral',this)">Минерали</div>
  <div class="tab" onclick="setTab('acid',this)">Масни киселини</div>
</div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <button class="close-btn" onclick="closeModal()">&#10005;</button>
  <div class="modal-header">
    <div class="modal-icon" id="mIcon"></div>
    <div><div class="modal-title" id="mName"></div><div class="modal-alias" id="mAlias"></div></div>
  </div>
  <div class="modal-body" id="mBody"></div>
</div>
<script>
const DATA=[
{type:'vitamin',icon:'\u{1F7E0}',name:'Витамин А',alias:'Ретинол / Бета-каротен',organs:['Очи \u{1F441}','Кожа \u{1FAE7}','Имунитет \u{1F6E1}','Бели дробови \u{1FAC1}'],desc:'Го штити видот и помага да гледаш во темница. Ја одржува кожата здрава и ја зајакнува одбраната на телото против инфекции. Слузниците во носот и грлото — прва бариера против бактерии — зависат директно од овој витамин.',foods:['Морков \u{1F955}','Слатки компири \u{1F360}','Спанаќ \u{1F96C}','Черен дроб \u{1FAC0}','Јајца \u{1F95A}','Путер','Диња \u{1F348}'],rda:'700-900 mcg/ден',ula:'3000 mcg/ден',form:'Масно растворлив',syms:['Ноќно слепило — прв знак','Сува и лупечка кожа','Чести инфекции на грло','Бавно заздравување рани'],tip:'Бета-каротен од морков е побезбеден — телото само зема колку му треба.',warn:'Премногу преку суплементи може да биде отровно!',timing:{when:'\u{1F305} Навечер — со вечера',withFood:'Зема со масна храна: авокадо, јајца, маслиново масло.',avoid:'Не зема со железо суплемент — взаемно се блокираат.'}},
{type:'vitamin',icon:'\u{1F33E}',name:'Витамин Б1',alias:'Тиамин',organs:['Мозок \u{1F9E0}','Нерви \u26A1','Мускули \u{1F4AA}','Срце \u2764'],desc:'Го претвора шеќерот од храната во енергија за мозокот и мускулите. Без него, нервите не можат правилно да пренесуваат сигнали — затоа дефицитот предизвикува замор и слабост. Срцето исто така зависи од него за нормален ритам.',foods:['Целозрнест леб \u{1F35E}','Свинско \u{1F969}','Мешунки','Ореви \u{1F95C}','Квасец','Зелен грашок'],rda:'1.1-1.2 mg/ден',ula:'Нема утврдена',form:'Водено растворлив',syms:['Хроничен замор и слабост','Нервоза без причина','Слабост во нозете'],tip:'Алкохолот го уништува Б1 — луѓе кои пијат редовно имаат дефицит.',timing:{when:'\u{1F305} Наутро — со појадок',withFood:'Зема со оброк богат со јаглехидрати: овес, леб.',avoid:'Не со кафе или чај веднаш — го намалуваат апсорпцијата.'}},
{type:'vitamin',icon:'\u{1F7E1}',name:'Витамин Б2',alias:'Рибофлавин',organs:['Кожа \u{1FAE7}','Очи \u{1F441}','Крв \u{1FA78}','Мускули \u{1F4AA}'],desc:'Му помага на телото да ја претвора храната во енергија. Ја одржува кожата и очите здрави, а крвните клетки им помага да се обновуваат. При интензивен тренинг, телото троши повеќе Б2 за да гори масти и јаглехидрати.',foods:['Млеко \u{1F95B}','Јогурт','Сирење','Јајца \u{1F95A}','Месо \u{1F969}','Бадеми','Спанаќ \u{1F96C}'],rda:'1.1-1.3 mg/ден',ula:'Нема утврдена',form:'Водено растворлив',syms:['Пукање на агли од уста','Воспален јазик','Чувствителни очи на светлина'],tip:'Урината станува жолта при земање Б2 — тоа е нормално!',timing:{when:'\u{1F305} Наутро — со појадок',withFood:'Зема со млечни производи или јајца.',avoid:'Чувај суплементи во темно — светлината го уништува Б2.'}},
{type:'vitamin',icon:'\u{1F534}',name:'Витамин Б3',alias:'Ниацин',organs:['Кожа \u{1FAE7}','Мозок \u{1F9E0}','Дигестија \u{1FAC3}','Крв \u{1FA78}'],desc:'Учествува во производство на енергија во секоја клетка. Го подобрува холестеролот — го намалува лошиот и го зголемува добриот. За мозокот е важен за производство на серотонин — хормонот на среќата.',foods:['Пилешко \u{1F357}','Туна \u{1F41F}','Лосос','Кикирики \u{1F95C}','Говедско','Цела пченица'],rda:'14-16 mg/ден',ula:'35 mg/ден',form:'Водено растворлив',syms:['Замор и слабост','Депресија и лошо расположение','Дигестивни проблеми'],tip:'Ниацинамид форма нема flush ефект — подобра за суплементација.',warn:'Ниацинска киселина во големи дози предизвикува жарење на кожата.',timing:{when:'\u{1F305} Наутро или пладне — со оброк',withFood:'Зема со протеинска храна: пилешко, риба, јајца.',avoid:'Не на гладно — може да предизвика жарење. Не со алкохол.'}},
{type:'vitamin',icon:'\u{1F344}',name:'Витамин Б5',alias:'Пантотенска киселина',organs:['Надбубрежни \u{1FAC0}','Кожа \u{1FAE7}','Мозок \u{1F9E0}','Мускули \u{1F4AA}'],desc:'Клучен за производство на хормони — тестостерон, кортизол и естроген зависат од него. Ја одржува кожата хидрирана и помага во заздравување. Важен е и за концентрација и меморија.',foods:['Пилешко дроб \u{1FAC0}','Авокадо \u{1F951}','Печурки \u{1F344}','Лосос \u{1F41F}','Јогурт'],rda:'5 mg/ден',ula:'Нема утврдена',form:'Водено растворлив',syms:['Трнење во стапала','Хроничен замор','Раздразливост','Проблеми со заспивање'],tip:'Пантенол во козметиката е провитамин Б5 — го хидрира и лекува кожата.',timing:{when:'\u{1F305} Наутро — со појадок',withFood:'Зема со кој било оброк. Авокадо или јогурт се одличен спој.',avoid:'Нема строги ограничувања.'}},
{type:'vitamin',icon:'\u{1F7E4}',name:'Витамин Б6',alias:'Пиридоксин',organs:['Мозок \u{1F9E0}','Крв \u{1FA78}','Имунитет \u{1F6E1}','Мускули \u{1F4AA}'],desc:'Помага во производство на серотонин и допамин — хормони кои го регулираат расположението и мотивацијата. Исто така е важен за градење на мускули бидејќи помага во обработката на протеините. При тренинг, телото троши повеќе Б6.',foods:['Лосос \u{1F41F}','Пилешко \u{1F357}','Туна','Компири \u{1F954}','Банана \u{1F34C}','Наут','Спанаќ \u{1F96C}'],rda:'1.3-1.7 mg/ден',ula:'100 mg/ден',form:'Водено растворлив',syms:['Депресија и анксиозност','Анемија — замор','Слаб имунитет'],warn:'Над 200mg/ден може трајно да ги оштети нервите!',timing:{when:'\u{1F305} Наутро или после тренинг',withFood:'Зема со протеинска храна: пилешко, риба, јајца.',avoid:'Не со алкохол — го уништува.'}},
{type:'vitamin',icon:'\u{1F487}',name:'Витамин Б7',alias:'Биотин',organs:['Коса \u{1F487}','Нокти \u{1F485}','Кожа \u{1FAE7}','Панкреас \u{1FAC0}'],desc:'Познат како "витамин за убавина" — директно влијае на јачината и растот на косата и ноктите. Помага во регулација на шеќерот во крвта. Дефицитот прв се гледа на косата — почнува да опаѓа.',foods:['Говедско дроб \u{1FAC0}','Јајца \u{1F95A} (жолтак)','Лосос \u{1F41F}','Авокадо \u{1F951}','Сирење','Кикирики'],rda:'30 mcg/ден',ula:'Нема утврдена',form:'Водено растворлив',syms:['Опаѓање на коса','Кршливи нокти','Кожни осипи','Замор'],tip:'Суровите белки го блокираат биотинот — секогаш варени јајца!',timing:{when:'\u{1F305} Наутро — на гладно',withFood:'Зема со жолтак или масна риба.',avoid:'Суровата белка го блокира биотинот целосно!'}},
{type:'vitamin',icon:'\u{1F96C}',name:'Витамин Б9',alias:'Фолна киселина / Фолат',organs:['Крв \u{1FA78}','Мозок \u{1F9E0}','ДНК \u{1F9EC}','Срце \u2764'],desc:'Неопходен за создавање на нови клетки — особено крвните. Го штити срцето преку регулирање на штетни материи во крвта. Кај бременост е апсолутно критичен за правилен развој на мозокот на бебето.',foods:['Спанаќ \u{1F96C}','Аспарагус','Говедско дроб \u{1FAC0}','Авокадо \u{1F951}','Брокули \u{1F966}','Наут','Леќа'],rda:'400 mcg/ден (600 бременост)',ula:'1000 mcg/ден',form:'Метилфолат форма е најдобра',syms:['Анемија — замор и бледило','Умор и слабост','Рани во уста'],tip:'Природен фолат од зеленчук е подобро искористен од таблети.',timing:{when:'\u{1F305} Наутро — со појадок',withFood:'Зема со зеленчук и портокалов сок — витамин Ц ја зголемува апсорпцијата.',avoid:'Алкохолот го блокира фолатот целосно.'}},
{type:'vitamin',icon:'\u{1F535}',name:'Витамин Б12',alias:'Кобаламин',organs:['Нерви \u26A1','Крв \u{1FA78}','Мозок \u{1F9E0}','Рбет \u{1F9B4}'],desc:'Ги одржува нервите здрави и помага во создавање на крвни клетки. Без него, нервните обвивки се оштетуваат — резултат е трнење, слабост и заборавност. Единствен витамин кој не постои во растителна храна.',foods:['Говедско дроб \u{1FAC0}','Лосос \u{1F41F}','Туна','Говедско \u{1F969}','Млеко \u{1F95B}','Јогурт','Јајца \u{1F95A}'],rda:'2.4 mcg/ден',ula:'Нема утврдена',form:'Метилкобаламин — подобра форма',syms:['Трнење во раце и нозе','Анемија — замор','Заборавност','Депресија'],tip:'Сублингвална форма (под јазик) се апсорбира најдобро!',warn:'Дефицитот се развива бавно но може трајно да ги оштети нервите!',timing:{when:'\u{1F305} Наутро — на гладно',withFood:'Сублингвална (под јазик) за максимална апсорпција.',avoid:'НЕ со витамин Ц истовремено — 2 часа разлика.'}},
{type:'vitamin',icon:'\u{1F34A}',name:'Витамин Ц',alias:'Аскорбинска киселина',organs:['Имунитет \u{1F6E1}','Кожа \u{1FAE7}','Зглобови \u{1F9B4}','Крв \u{1FA78}'],desc:'Го јакне имунитетот и помага во борбата против инфекции. Го гради колагенот — "лепилото" кое ги држи кожата, зглобовите и крвните садови заедно. При тренинг помага во закрепнување и го намалува стресниот хормон.',foods:['Kivi \u{1F95D}','Портокал \u{1F34A}','Јагоди \u{1F353}','Пиперка \u{1FAD1} (НАЈВЕЌЕ!)','Брокули \u{1F966}','Лимон \u{1F34B}'],rda:'75-90 mg/ден',ula:'2000 mg/ден',form:'Водено растворлив',syms:['Чести и долги настинки','Бавно заздравување рани','Крварење на непце','Замор'],tip:'Пиперката содржи 3x повеќе витамин Ц од портокалот! Готвењето го уништува.',timing:{when:'\u{1F305} Наутро + \u{1F306} Попладне',withFood:'Со железна храна (спанаќ, месо) — го утројува апсорпцијата!',avoid:'НЕ со Б12 истовремено — 2 часа разлика.'}},
{type:'vitamin',icon:'\u2600\uFE0F',name:'Витамин Д',alias:'Калциферол / Сончев витамин',organs:['Коски \u{1F9B4}','Имунитет \u{1F6E1}','Мускули \u{1F4AA}','Мозок \u{1F9E0}'],desc:'Го апсорбира калциумот и го носи во коските — без него коските стануваат слаби. Го јакне имунитетот и го намалува ризикот од инфекции. Влијае и на расположението — ниско ниво е честа причина за зимска депресија.',foods:['Лосос \u{1F41F}','Скуша','Сардини','Туна','Јајчен жолтак','Зајакнато млеко \u{1F95B}'],rda:'600-800 IU/ден',ula:'4000 IU/ден',form:'Д3 е подобар од Д2',syms:['Болки во коски и грб','Мускулна слабост','Чести настинки','Замор','Зимска депресија'],tip:'80% Македонци имаат дефицит зима. Провери со крвна анализа!',warn:'Мора да се зема со витамин К2 — без него калциумот може да оди во артерии!',timing:{when:'\u{1F305} Наутро — со појадок',withFood:'ЗАДОЛЖИТЕЛНО со масна храна: јајца, авокадо, маслиново масло.',avoid:'НЕ навечер — може да го наруши сонот. НЕ на гладно.'}},
{type:'vitamin',icon:'\u{1F33B}',name:'Витамин Е',alias:'Токоферол',organs:['Кожа \u{1FAE7}','Крв \u{1FA78}','Имунитет \u{1F6E1}','Срце \u2764'],desc:'Моќен антиоксидант кој ги штити клетките од оштетување. Го штити "лошиот" холестерол од оксидација — токму оксидираниот холестерол ги запушува крвните садови. Ја одржува кожата млада и ја штити.',foods:['Сончогледово масло \u{1F33B}','Бадеми \u{1F330}','Спанаќ \u{1F96C}','Авокадо \u{1F951}','Лешници','Сончогледово семе'],rda:'15 mg/ден',ula:'1000 mg/ден',form:'Природен мешан токоферол е подобар',syms:['Мускулна слабост','Проблеми со рамнотежа','Слаб имунитет','Сува кожа'],tip:'Природниот витамин Е (d-алфа) е подобар од синтетскиот (dl-алфа).',timing:{when:'\u{1F305} Наутро или \u{1F306} Попладне — со масен оброк',withFood:'Зема со ореви, авокадо, маслиново масло.',avoid:'НЕ со железо истовремено — 2 часа разлика.'}},
{type:'vitamin',icon:'\u{1F966}',name:'Витамин К',alias:'К1 / К2 Менахинон',organs:['Коски \u{1F9B4}','Крв \u{1FA78}','Срце \u2764','Артерии \u{1FAC0}'],desc:'К1 ја запира крвта да тече при рани. К2 го носи калциумот директно во коските и спречува да се таложи во артериите. Оваа комбинација го прави неопходен за здраво срце и силни коски.',foods:['Кел \u{1F966}','Спанаќ \u{1F96C}','Брокули','Натто (ферм. соја)','Сирење','Жолтак'],rda:'90-120 mcg/ден',ula:'Нема утврдена',form:'К2 MK-7 е најдобра форма',syms:['Лесно крварење при рани','Чести модринки','Слаби коски'],tip:'К2 + Д3 = совршена комбинација за коски и срце!',timing:{when:'\u{1F305} Наутро — со Витамин Д3',withFood:'Зема со масна храна заедно со Д3.',avoid:'Ако земаш лекови за разредување крв — консултирај лекар!'}},
{type:'mineral',icon:'\u{1F9B4}',name:'Калциум',alias:'Calcium / Ca',organs:['Коски \u{1F9B4}','Заби \u{1F9B7}','Мускули \u{1F4AA}','Срце \u2764'],desc:'Го гради и одржува цврстината на коските и забите. Исто така е сигнал за мускулна контракција — без него мускулите добиваат грчеви. Срцето зависи од калциум за правилен ритам на чукање.',foods:['Млеко \u{1F95B}','Јогурт','Сирење','Сардини со коски \u{1F41F}','Тофу','Бадеми \u{1F330}','Кел \u{1F966}'],rda:'1000-1200 mg/ден',ula:'2500 mg/ден',form:'Цитрат форма — подобра апсорпција',syms:['Мускулни грчеви ноќе','Трнење во прсти','Слаби коски','Кариес'],tip:'Без витамин Д3 и К2, калциумот не може правилно да се апсорбира!',warn:'Вишок без К2 може да се таложи во артерии!',timing:{when:'\u{1F306} Попладне или \u{1F319} Навечер',withFood:'Карбонат — со храна. Цитрат — може и на гладно.',avoid:'НЕ со железо — 2 часа разлика.'}},
{type:'mineral',icon:'\u26A1',name:'Магнезиум',alias:'Magnesium / Mg',organs:['Мускули \u{1F4AA}','Нерви \u26A1','Срце \u2764','Мозок \u{1F9E0}'],desc:'Го опушта мускулите и спречува грчеви — затоа е идеален пред спиење. Го смирува нервниот систем и го намалува стресот и анксиозноста. При тренинг, телото го троши брзо преку пот — дефицитот директно ги намалува перформансите.',foods:['Темна чоколада \u{1F36B}','Авокадо \u{1F951}','Ореви \u{1F95C}','Мешунки','Банана \u{1F34C}','Лосос \u{1F41F}','Спанаќ \u{1F96C}'],rda:'310-420 mg/ден',ula:'350 mg/ден суплементи',form:'Глицинат (сон) · Малат (енергија) · Цитрат (генерален)',syms:['Мускулни грчеви','Анксиозност и нервоза','Несоница','Главоболки','Хроничен замор'],tip:'Магнезиум оксид = практично бескорисен. Глицинат е НАЈДОБАР за сон.',timing:{when:'\u{1F319} Навечер — 30-60 мин пред спиење',withFood:'Со мал оброк или банана.',avoid:'НЕ со калциум истовремено. НЕ со антибиотици — 2 часа разлика.'}},
{type:'mineral',icon:'\u{1F6E1}',name:'Цинк',alias:'Zinc / Zn',organs:['Имунитет \u{1F6E1}','Простата \u{1FAC0}','Кожа \u{1FAE7}','Мускули \u{1F4AA}'],desc:'Го јакне имунитетот и помага во борбата против настинки. Кај мажи е особено важен — го поддржува производството на тестостерон. Помага и во заздравување на рани и одржување на здрава кожа.',foods:['Остриги \u{1F9AA} (НАЈВЕЌЕ)','Говедско \u{1F969}','Пилешко \u{1F357}','Тиквено семе','Леќа','Наут'],rda:'8-11 mg/ден',ula:'40 mg/ден',form:'Пиколинат или бисглицинат',syms:['Чести настинки','Бавно заздравување рани','Опаѓање коса','Губиток мирис/вкус'],tip:'Тиквените семки се одличен природен извор на цинк!',warn:'Долгорочно само цинк без бакар создава бакар дефицит!',timing:{when:'\u{1F319} Навечер — со вечера',withFood:'Со мал протеински оброк: пилешко, јајца.',avoid:'НЕ со калциум или железо. НЕ на потполно гладно.'}},
{type:'mineral',icon:'\u{1FA78}',name:'Железо',alias:'Iron / Fe',organs:['Крв \u{1FA78}','Мускули \u{1F4AA}','Мозок \u{1F9E0}','Бели дробови \u{1FAC1}'],desc:'Го пренесува кислородот низ крвта до секој орган и мускул. Без доволно железо, крвта не може да носи доволно кислород — резултат е замор, задув и бледило. Кај жени, менструацијата го зголемува ризикот од дефицит.',foods:['Говедско дроб \u{1FAC0}','Говедско \u{1F969}','Остриги \u{1F9AA}','Спанаќ \u{1F96C}','Леќа','Тофу'],rda:'8-18 mg/ден',ula:'45 mg/ден',form:'Бисглицинат — најмала иритација',syms:['Хроничен замор и слабост','Бледа кожа','Задув при напор','Кршливи нокти'],tip:'Витамин Ц го утројува апсорпцијата — пиј портокалов сок со спанаќ!',warn:'Не суплементирај без крвна слика — вишок железо е штетен!',timing:{when:'\u{1F305} Наутро — на гладно',withFood:'Со витамин Ц (портокал, пиперка) — го утројува апсорпцијата!',avoid:'НЕ со кафе, чај, млеко, калциум — сите блокираат апсорпција.'}},
{type:'mineral',icon:'\u{1F34C}',name:'Калиум',alias:'Potassium / K',organs:['Срце \u2764','Мускули \u{1F4AA}','Бубрези \u{1FAD8}','Крвни садови \u{1FA78}'],desc:'Го регулира крвниот притисок и го одржува срчениот ритам стабилен. Мускулите — вклучувајќи го срцето — зависат од калиум за правилна контракција. При тренинг и потење, телото го губи брзо, а дефицитот предизвикува грчеви.',foods:['Банана \u{1F34C}','Авокадо \u{1F951}','Слатки компири \u{1F360}','Спанаќ \u{1F96C}','Лосос \u{1F41F}','Бел грав'],rda:'2600-3400 mg/ден',ula:'90 mg/ден суплементи',form:'Цитрат или глуконат форма',syms:['Мускулни грчеви','Срцева аритмија','Слабост','Висок крвен притисок'],tip:'Авокадото содржи повеќе калиум од бананата — и без шеќер!',timing:{when:'\u{1F305} Наутро и \u{1F306} Попладне — со оброци',withFood:'Најдобро преку храна: банана, компир, авокадо.',avoid:'НЕ голема доза суплемент одеднаш — ризик за аритмија!'}},
{type:'mineral',icon:'\u{1F9C2}',name:'Натриум',alias:'Sodium / Na',organs:['Крв \u{1FA78}','Нерви \u26A1','Бубрези \u{1FAD8}','Мускули \u{1F4AA}'],desc:'Го контролира количеството на течност во телото и крвниот притисок. Неопходен за пренос на нервни сигнали и мускулна контракција. При интензивен тренинг, голема количина се губи преку пот.',foods:['Кујнска сол \u{1F9C2}','Преработена храна','Сирење','Маслинки','Конзервирана храна'],rda:'1500 mg/ден',ula:'2300 mg/ден',form:'NaCl — обична сол',syms:['Оток на нозе','Висок крвен притисок','Прекумерна жед','Главоболки'],warn:'Просечниот Македонец јаде 2-3x повеќе сол од препорачаното!',timing:{when:'\u26A1 Пред и за време на тренинг',withFood:'Мало количество сол + вода пред тренинг спречува грчеви.',avoid:'НЕ прекумерувај навечер — задржува вода и нарушува сон.'}},
{type:'mineral',icon:'\u{1F330}',name:'Селениум',alias:'Selenium / Se',organs:['Тироид \u{1F98B}','Имунитет \u{1F6E1}','Простата \u{1FAC0}','Крв \u{1FA78}'],desc:'Го штити тироидот — жлездата која го контролира целиот метаболизам. Моќен антиоксидант кој ги штити клетките. Кај мажи е важен за здравје на простатата и квалитет на сперма.',foods:['Бразилски ореви \u{1F330} (1-2/ден!)','Туна \u{1F41F}','Лосос','Говедско \u{1F969}','Јајца \u{1F95A}'],rda:'55 mcg/ден',ula:'400 mcg/ден',form:'Селеномионин форма е подобра',syms:['Замор и зголемување тежина','Слаб имунитет','Мускулна слабост'],tip:'Само 1-2 бразилски ореви на ден го задоволуваат целото дневно ниво!',warn:'Вишок е токсичен — мирис на лук, опаѓање коса.',timing:{when:'\u{1F305} Наутро — со појадок',withFood:'Со риба или јајца. Витамин Е го засилува ефектот.',avoid:'НЕ над 200mcg/ден суплемент без лекар.'}},
{type:'mineral',icon:'\u{1F98B}',name:'Јод',alias:'Iodine / I',organs:['Тироид \u{1F98B}','Мозок \u{1F9E0}','Метаболизам \u26A1','Коса \u{1F487}'],desc:'Неопходен за тироидната жлезда која го регулира метаболизмот, телесната температура и енергијата. Без доволно јод, метаболизмот се забавува — се качува тежина и се чувствуваш уморно. Кај деца е критичен за развој на мозокот.',foods:['Морска риба \u{1F41F}','Морски плодови \u{1F990}','Јодирана сол \u{1F9C2}','Млеко \u{1F95B}','Јогурт','Јајца \u{1F95A}'],rda:'150 mcg/ден',ula:'1100 mcg/ден',form:'Калиум јодид форма',syms:['Зголемување тежина','Замор и студеност','Голем тироид (гуша)','Опаѓање коса'],tip:'Јодираната сол е доволна ако јадеш нормална исхрана.',timing:{when:'\u{1F305} Наутро — со појадок',withFood:'Со млечни производи или риба.',avoid:'НЕ со соин протеин — го блокира апсорпцијата.'}},
{type:'mineral',icon:'\u{1F535}',name:'Бакар',alias:'Copper / Cu',organs:['Крв \u{1FA78}','Коски \u{1F9B4}','Нерви \u26A1','Кожа \u{1FAE7}'],desc:'Помага на телото да го искористи железото — без бакар, железото не може да влезе во крвните клетки. Исто така е важен за градење на коските и нервните обвивки. Го одржува природната боја на косата.',foods:['Остриги \u{1F9AA}','Говедско дроб \u{1FAC0}','Сончогледово семе','Лешници \u{1F330}','Темна чоколада \u{1F36B}'],rda:'900 mcg/ден',ula:'10 mg/ден',form:'Бисглицинат форма',syms:['Анемија која не реагира на железо','Слаб имунитет','Слаби коски','Прерано сивеење коса'],tip:'Ако земаш цинк суплемент — земај и бакар! Сооднос 8:1.',timing:{when:'\u{1F306} Попладне — со ручек',withFood:'Со кој било оброк.',avoid:'НЕ со цинк истовремено — мин. 4 часа разлика.'}},
{type:'mineral',icon:'\u{1F7E3}',name:'Хром',alias:'Chromium / Cr',organs:['Панкреас \u{1FAC0}','Крв \u{1FA78}','Мускули \u{1F4AA}','Мозок \u{1F9E0}'],desc:'Го засилува дејството на инсулинот — помага шеќерот да влезе побрзо во клетките наместо да остане во крвта. Резултат: стабилен шеќер, помалку желба за слатко и подобра енергија.',foods:['Брокули \u{1F966}','Цели жита \u{1F33E}','Грозје \u{1F347}','Говедско месо','Јајца \u{1F95A}','Кикирики \u{1F95C}'],rda:'25-35 mcg/ден',ula:'Нема утврдена',form:'Хром пиколинат',syms:['Силна желба за слатко','Нестабилен шеќер во крв','Замор после оброк'],tip:'Брокулито е најдобар природен извор на биоактивен хром.',timing:{when:'\u{1F37D} Пред јаглехидратен оброк',withFood:'Точно пред ручек или вечера — го подобрува одговорот на инсулин.',avoid:'НЕ со антациди — го намалуваат апсорпцијата.'}},
{type:'acid',icon:'\u{1F41F}',name:'Омега-3',alias:'EPA · DHA · ALA',organs:['Мозок \u{1F9E0}','Срце \u2764','Зглобови \u{1F9B4}','Кожа \u{1FAE7}','Мускули \u{1F4AA}'],desc:'Ги намалува воспаленијата низ целото тело — особено во зглобовите и срцето. Во мозокот подобрува концентрација, расположение и меморија. При тренинг ги намалува болките после, го забрзува закрепнувањето и помага повеќе гориво да оди во мускулите.',foods:['Лосос \u{1F41F}','Скуша','Сардини','Харинга','Орев \u{1F95C} (ALA)','Лнено семе'],rda:'250-500 mg EPA+DHA/ден',ula:'3000 mg/ден',form:'Триглицерид форма — подобра апсорпција',syms:['Воспаление и болки во зглобови','Сува кожа','Депресија','Слаба концентрација'],tip:'Оревот и лненото семе не се доволни — треба вистинска риба или рибино масло!',warn:'Над 3g/ден внимавај ако земаш лекови за разредување крв.',timing:{when:'\u{1F305} Наутро или \u{1F306} Попладне — со масен оброк',withFood:'ЗАДОЛЖИТЕЛНО со масна храна — без маст апсорпцијата пада за половина.',avoid:'НЕ на гладно — гадење и рибест вкус.'}},
{type:'acid',icon:'\u{1F33B}',name:'Омега-6',alias:'Линолна / Арахидонска киселина',organs:['Кожа \u{1FAE7}','Имунитет \u{1F6E1}','Хормони \u{1F504}','Клетки \u{1F9EC}'],desc:'Есенцијална масна киселина важна за функција на клетките. Проблемот е што денешната исхрана содржи премногу Омега-6 наспроти Омега-3 — тоа создава хронично воспаление. Целта е рамнотежа, не избегнување.',foods:['Сончогледово масло \u{1F33B}','Пченкарно масло','Кикирики \u{1F95C}','Пилешко \u{1F357}','Јајца \u{1F95A}'],rda:'11-17 g/ден',ula:'Нема утврдена',form:'Линолна и арахидонска киселина',syms:['Дефицит е практично невозможен','Вишок предизвикува хронично воспаление'],tip:'Намали сончогледово масло, зголеми маслиново масло и риба.',warn:'Не пржи на сончогледово масло — на висока температура создава штетни материи!',timing:{when:'\u{1F37D} Со секој оброк — преку природна храна',withFood:'Добиваш доволно преку нормална исхрана.',avoid:'НЕ пржи на сончогледово масло на висока температура.'}},
{type:'acid',icon:'\u{1FAD2}',name:'Омега-9',alias:'Олеинска киселина (MUFA)',organs:['Срце \u2764','Крвни садови \u{1FA78}','Мозок \u{1F9E0}','Инсулин \u{1F504}'],desc:'Го намалува лошиот холестерол и ги штити крвните садови. Ја подобрува осетливоста на клетките на инсулин — шеќерот подобро влегува во мускулите наместо во маснотии. Медитеранската исхрана богата со маслиново масло е докажана за долговечност.',foods:['Маслиново масло \u{1FAD2}','Авокадо \u{1F951}','Бадеми \u{1F330}','Лешници','Кикирики \u{1F95C}','Маслинки'],rda:'Нема официјална RDA',ula:'Нема утврдена',form:'Олеинска киселина (C18:1)',syms:['Дефицит е редок','Без Омега-9: повисок ризик за срцеви болести'],tip:'Extra virgin маслиново масло содржи и антиоксиданти со анти-воспалително дејство!',timing:{when:'\u{1F37D} Со секој оброк',withFood:'Маслиново масло на салата, авокадо со јајца, бадеми како закуска.',avoid:'НЕ загревај extra virgin маслиново масло над 180°C.'}},
];
let currentTab='all';
function setTab(t,el){currentTab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const grid=document.getElementById('grid');
  const f=DATA.filter(d=>{
    const mt=currentTab==='all'||d.type===currentTab;
    const mq=!q||d.name.toLowerCase().includes(q)||d.alias.toLowerCase().includes(q)||d.foods.some(x=>x.toLowerCase().includes(q))||d.organs.some(x=>x.toLowerCase().includes(q));
    return mt&&mq;
  });
  if(!f.length){grid.innerHTML='<div class="empty"><div>&#128269;</div>Нема резултати</div>';return;}
  grid.innerHTML=f.map(d=>'<div class="card '+d.type+'" onclick="openModal('+DATA.indexOf(d)+')"><div class="card-icon">'+d.icon+'</div><div class="card-name">'+d.name+'</div><div class="card-alias">'+d.alias+'</div><span class="badge '+d.type+'">'+(d.type==='vitamin'?'Витамин':d.type==='mineral'?'Минерал':'Масна кис.')+'</span></div>').join('');
}
function openModal(i){
  const d=DATA[i];
  const pc=d.type==='mineral'?'min':d.type==='acid'?'acid':'';
  document.getElementById('mIcon').textContent=d.icon;
  document.getElementById('mName').textContent=d.name;
  document.getElementById('mAlias').textContent=d.alias;
  let h='<div class="section-label">Влијае на</div><div class="organs-row">'+d.organs.map(o=>'<span class="organ-pill '+pc+'">'+o+'</span>').join('')+'</div>';
  h+='<div class="info-box">'+d.desc+'</div>';
  h+='<div class="section-label">Најдобри извори на храна</div><div class="food-grid">'+d.foods.map(f=>'<span class="food-pill '+pc+'">'+f+'</span>').join('')+'</div>';
  h+='<div class="section-label">Дозирање</div><div class="dose-row"><span class="dose-label">&#127919; Дневна потреба</span><span class="dose-val">'+d.rda+'</span></div>';
  if(d.ula)h+='<div class="dose-row"><span class="dose-label">&#9940; Горна граница</span><span class="dose-val">'+d.ula+'</span></div>';
  if(d.form)h+='<div class="dose-row"><span class="dose-label">&#128138; Форма</span><span class="dose-val">'+d.form+'</span></div>';
  if(d.timing){
    h+='<div class="section-label">&#9200; Кога и со што да се зема</div>';
    h+='<div class="timing-card neutral"><div class="timing-title neutral">&#128336; Најдобро време</div><div class="timing-body">'+d.timing.when+'</div></div>';
    h+='<div class="timing-card good"><div class="timing-title good">&#9989; Зема со оваа храна</div><div class="timing-body">'+d.timing.withFood+'</div></div>';
    h+='<div class="timing-card bad"><div class="timing-title bad">&#10060; Избегнувај</div><div class="timing-body">'+d.timing.avoid+'</div></div>';
  }
  h+='<div class="section-label">Симптоми на дефицит</div><ul class="sym-list">'+d.syms.map(s=>'<li>'+s+'</li>').join('')+'</ul>';
  if(d.tip)h+='<div class="section-label">&#128161; Совет</div><div class="tip-box">'+d.tip+'</div>';
  if(d.warn)h+='<div class="section-label">&#9888;&#65039; Внимание</div><div class="tip-box warn">'+d.warn+'</div>';
  document.getElementById('mBody').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.getElementById('modal').classList.remove('open');}
render();
</script>
