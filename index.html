<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>НутриЛаб</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f0d;--card:#111916;--card2:#162019;--accent:#39e07a;--accent2:#ffcc44;--accent3:#ff6b35;--accent4:#60c5ff;--text:#e8f0eb;--muted:#6a8272;--border:#1f2e25;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{background:linear-gradient(135deg,#0d1a10,#0a150d);padding:28px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:3px;color:var(--accent);line-height:1;}
header p{color:var(--muted);font-size:0.78rem;margin-top:2px;letter-spacing:1px;}
.search-wrap{padding:12px 16px 8px;background:var(--bg);position:sticky;top:88px;z-index:99;}
.search-inner{position:relative;}
.search-inner input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px 12px 42px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color .2s;}
.search-inner input::placeholder{color:var(--muted);}
.search-inner input:focus{border-color:var(--accent);}
.search-inner span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
.tabs{display:flex;gap:8px;padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;font-size:0.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0a0f0d;font-weight:600;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 100px;}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px 14px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;}
.card.vitamin::before{background:var(--accent);}
.card.mineral::before{background:var(--accent2);}
.card.acid::before{background:var(--accent3);}
.card:active{transform:scale(0.96);}
.card-icon{font-size:1.9rem;margin-bottom:8px;}
.card-name{font-weight:600;font-size:0.93rem;}
.card-alias{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.badge{display:inline-block;font-size:0.62rem;font-weight:600;letter-spacing:.5px;padding:2px 8px;border-radius:50px;margin-top:8px;text-transform:uppercase;}
.badge.vitamin{background:rgba(57,224,122,.15);color:var(--accent);}
.badge.mineral{background:rgba(255,204,68,.15);color:var(--accent2);}
.badge.acid{background:rgba(255,107,53,.15);color:var(--accent3);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{position:fixed;bottom:0;left:0;right:0;background:var(--card2);border-radius:28px 28px 0 0;border-top:1px solid var(--border);max-height:90vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding-bottom:50px;}
.modal.open{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:14px auto 0;}
.close-btn{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.07);border:none;border-radius:50%;width:34px;height:34px;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-header{padding:18px 22px 0;display:flex;align-items:flex-start;gap:14px;}
.modal-icon{font-size:2.8rem;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;line-height:1;}
.modal-alias{color:var(--muted);font-size:0.8rem;margin-top:4px;}
.modal-body{padding:16px 22px 0;}
.section-label{font-size:0.68rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:18px;}
.info-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:13px;font-size:0.86rem;line-height:1.7;color:#c5d9ca;}
.info-box p{margin-bottom:8px;}
.info-box p:last-child{margin-bottom:0;}
.info-box strong{color:var(--text);font-weight:600;}
.food-grid{display:flex;flex-wrap:wrap;gap:6px;}
.food-pill{background:rgba(57,224,122,.08);border:1px solid rgba(57,224,122,.2);border-radius:50px;padding:5px 12px;font-size:0.77rem;color:var(--accent);}
.food-pill.min{background:rgba(255,204,68,.08);border-color:rgba(255,204,68,.2);color:var(--accent2);}
.food-pill.acid{background:rgba(255,107,53,.08);border-color:rgba(255,107,53,.2);color:var(--accent3);}
.dose-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:0.84rem;margin-bottom:6px;}
.dose-label{color:var(--muted);flex-shrink:0;}
.dose-val{font-weight:600;text-align:right;font-size:.8rem;margin-left:8px;}
.sym-list{list-style:none;}
.sym-list li{padding:7px 0;border-bottom:1px solid var(--border);font-size:0.84rem;color:#c5d9ca;display:flex;align-items:center;gap:8px;}
.sym-list li:last-child{border-bottom:none;}
.sym-list li::before{content:'⚠️';font-size:.75rem;flex-shrink:0;}
.tip-box{background:rgba(57,224,122,.06);border:1px solid rgba(57,224,122,.15);border-radius:12px;padding:12px 14px;font-size:0.82rem;color:#9dccab;line-height:1.55;margin-top:8px;}
.tip-box.warn{background:rgba(255,107,53,.06);border-color:rgba(255,107,53,.15);color:#d8a090;}
.timing-card{border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid;}
.timing-card.good{background:rgba(57,224,122,.06);border-color:rgba(57,224,122,.2);}
.timing-card.bad{background:rgba(255,80,80,.06);border-color:rgba(255,80,80,.2);}
.timing-card.neutral{background:rgba(96,197,255,.06);border-color:rgba(96,197,255,.2);}
.timing-title{font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.timing-title.good{color:var(--accent);}
.timing-title.bad{color:#ff6060;}
.timing-title.neutral{color:var(--accent4);}
.timing-body{font-size:0.84rem;line-height:1.55;color:#c5d9ca;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
.empty div{font-size:2.5rem;margin-bottom:10px;}
</style>
</head>
<body>
<header>
  <h1>НУТРИЛАБ</h1>
  <p>ВИТАМИНИ · МИНЕРАЛИ · МАСНИ КИСЕЛИНИ</p>
</header>
<div class="search-wrap">
  <div class="search-inner">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Пребарај витамин, минерал, храна..." oninput="render()">
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="setTab('all',this)">Сите</div>
  <div class="tab" onclick="setTab('vitamin',this)">Витамини</div>
  <div class="tab" onclick="setTab('mineral',this)">Минерали</div>
  <div class="tab" onclick="setTab('acid',this)">Масни киселини</div>
</div>
<div class="grid" id="grid"></div>
<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <button class="close-btn" onclick="closeModal()">✕</button>
  <div class="modal-header">
    <div class="modal-icon" id="mIcon"></div>
    <div><div class="modal-title" id="mName"></div><div class="modal-alias" id="mAlias"></div></div>
  </div>
  <div class="modal-body" id="mBody"></div>
</div>

<script>
const DATA = [
  {
    type:'vitamin',icon:'🟠',name:'Витамин А',alias:'Ретинол / Бета-каротен',
    desc:`<p><strong>Витамин А е масно растворлив витамин</strong> кој го складира телото во черниот дроб. Постои во два облика: <strong>ретинол</strong> (директно активен, наоѓа се во животински производи) и <strong>бета-каротен</strong> (провитамин, телото само го претвора колку му треба).</p>
<p>Во очите, ретинолот се претвора во <strong>родопсин</strong> — пигментот задолжен за гледање во темница. Без доволно витамин А, ноќното гледање значително се влошува. Во кожата, ретиноидите ја регулираат поделбата на клетките — затоа дермatolозите препишуваат ретинол кремови за акни и стареење.</p>
<p>За имунитетот, витамин А го одржува интегритетот на слузниците (нос, грло, белите дробови) — тоа се <strong>прва линија на одбрана</strong> против инфекции. Недостаток значи пробиви во таа одбрана.</p>
<p>Кај спортисти: витамин А помага во синтеза на гликоген и протеини, и го поддржува производството на тестостерон преку надбубрежните жлезди.</p>`,
    foods:['Морков 🥕','Слатки компири 🍠','Спанаќ 🥬','Черен дроб 🫀','Јајца 🥚','Путер','Диња 🍈'],
    rda:'700–900 mcg/ден', ula:'3000 mcg/ден', form:'Масно растворлив',
    syms:['Ноќно слепило — прв знак на дефицит','Сувост и лупење на кожа','Чести инфекции на грло и нос','Бавно заздравување рани','Проблеми со раст кај деца'],
    tip:'Бета-каротен е побезбеден — телото само регулира колку претвора. Не може да предозираш преку морков.',
    warn:'Вишок ретинол преку суплементи е ТОКСИЧЕН — се складира во черниот дроб. Бременост: внимавај со дози!',
    timing:{when:'🌙 Навечер — со вечера',withFood:'Зема со масна храна: авокадо, маслиново масло, јајца, месо. Маснотиите ја зголемуваат апсорпцијата 3–5 пати!',avoid:'Не зема со железо суплемент — взаемно се блокираат. Избегнувај алкохол при суплементација.'}
  },
  {
    type:'vitamin',icon:'🌾',name:'Витамин Б1',alias:'Тиамин',
    desc:`<p><strong>Тиаминот е коензим задолжен за метаболизам на јаглехидрати.</strong> Без него, телото не може ефикасно да ги претвора шеќерите и скробот во АТП — универзалната енергетска валута на клетките.</p>
<p>Клучна улога игра во <strong>пируват декарбоксилаза</strong> — ензимот кој го „внесува" горивото во Кребсовиот циклус. Ако нема доволно Б1, пируватот се претвора во лактат (млечна киселина) — резултат: замор, слабост, болки во мускули.</p>
<p>Нервниот систем целосно зависи од Б1 за производство на <strong>ацетилхолин</strong> — невротрансмитер за мускулна контракција и меморија. Затоа дефицитот прво удара во нерви и мускули.</p>
<p>Кај спортисти: колку повеќе јаглехидрати конзумираш за енергија, толку повеќе Б1 ти треба. Интензивниот тренинг ги зголемува потребите значително.</p>`,
    foods:['Целозрнест леб 🍞','Свинско месо 🥩','Мешунки','Ореви 🥜','Квасец','Зелен грашок'],
    rda:'1.1–1.2 mg/ден', ula:'Нема утврдена', form:'Водено растворлив — секојдневно',
    syms:['Хроничен замор и слабост','Нервоза и раздразливост без причина','Слабост на мускули, особено нозе','Бери-бери — срцева и нервна слабост (тешки случаи)','Верниковата енцефалопатија (при алкохолизам)'],
    tip:'Алкохолот го уништува Б1 и ја блокира апсорпцијата — луѓе кои пијат редовно имаат сериозен дефицит.',
    timing:{when:'🌅 Наутро — со појадок',withFood:'Зема со оброк богат со јаглехидрати: овес, леб, кикирики. Јаглехидратите и Б1 работат заедно за енергија.',avoid:'Не зема со кафе или чај — таните го намалуваат апсорпцијата. Алкохолот целосно го уништува.'}
  },
  {
    type:'vitamin',icon:'🟡',name:'Витамин Б2',alias:'Рибофлавин',
    desc:`<p><strong>Рибофлавинот е градбен камен на FAD и FMN</strong> — два коензими кои учествуваат во скоро секоја реакција на производство на енергија во митохондриите. Без него, митохондриите буквално не можат да „горат" гориво ефикасно.</p>
<p>Учествува во <strong>бета-оксидацијата на масти</strong> — процесот на претворање масни киселини во енергија. Ова е особено важно при долготраен тренинг кога телото се префрла на масти како гориво.</p>
<p>Витамин Б2 е клучен и за <strong>рециклирање на глутатион</strong> — главниот антиоксидант на телото. Без Б2, оксидативниот стрес расте, а клетките постаруваат побрзо.</p>
<p>За кожата и очите: рибофлавинот одржува здравје на рожницата и слузниците. Дефицитот прво се гледа на усните и јазикот — пукање и возпаление.</p>`,
    foods:['Млеко 🥛','Јогурт','Сирење','Јајца 🥚','Месо 🥩','Бадеми','Спанаќ 🥬'],
    rda:'1.1–1.3 mg/ден', ula:'Нема утврдена', form:'Водено растворлив',
    syms:['Пукање и возпаление на агли од усти','Возпаление и оток на јазик (глосит)','Чувствителност на очи кон светлина','Кожни проблеми и себореичен дерматит','Анемија при долготраен дефицит'],
    tip:'Урината станува интензивно жолта при земање Б2 суплемент — тоа е нормално, телото го излачува вишокот.',
    timing:{when:'🌅 Наутро — со појадок',withFood:'Зема со млечни производи или јајца — природно богати со Б2, ја зголемуваат апсорпцијата.',avoid:'Директната светлина го уништува Б2 — суплементите чувај во темно. Алкохолот го намалува апсорпцијата.'}
  },
  {
    type:'vitamin',icon:'🔴',name:'Витамин Б3',alias:'Ниацин',
    desc:`<p><strong>Ниацинот е суштествен за синтеза на NAD+ и NADP+</strong> — коензими кои учествуваат во повеќе од 400 ензимски реакции. NAD+ е директно вклучен во производство на АТП, ДНК поправка и регулација на гени поврзани со стареење.</p>
<p>Во последниве години, <strong>NAD+ прекурсорите</strong> (ниацин, NMN, NR) станаа популарни во anti-aging светот бидејќи нивоата на NAD+ природно паѓаат со возраста — резултат: помалку енергија, побавна регенерација.</p>
<p>Ниацинот во <strong>高и дози</strong> го намалува LDL холестеролот и триглицеридите, и го зголемува HDL — ефект кој го нема ниедна друга Б-витаминска форма. Но тоа доаѓа со "flush" ефект — жарење на кожата.</p>
<p>За мозокот: NAD+ е неопходен за синтеза на серотонин од триптофан. Дефицитот директно влијае на расположение и когниција.</p>`,
    foods:['Пилешко 🍗','Туна 🐟','Лосос','Кикирики 🥜','Говедско месо','Цела пченица','Компир 🥔'],
    rda:'14–16 mg/ден', ula:'35 mg/ден', form:'Водено растворлив',
    syms:['Пелагра: дерматит, дијареа, деменција (3Д)','Хроничен замор и слабост','Депресија и анксиозност','Главоболки и несоница','Воспаление на кожата при изложување на сонце'],
    tip:'Ниацинамид (не ниацинска киселина) нема flush ефект и е подобра форма за суплементација. Исто ефективна за NAD+.',
    warn:'Ниацинска киселина во високи дози предизвикува жарење и crvenilo на кожата 20–30 мин по земање. Не е опасно, но непријатно.',
    timing:{when:'🌅 Наутро или пладне — со оброк',withFood:'Зема со оброк кој содржи протеини: пилешко, риба, јајца. Протеините (триптофан) се конвертираат во Б3.',avoid:'Ниацинска киселина НЕ на празен стомак — силен flush ефект. Не комбинирај со алкохол — го зголемува flush и го оштетува черниот дроб.'}
  },
  {
    type:'vitamin',icon:'🍄',name:'Витамин Б5',alias:'Пантотенска киселина',
    desc:`<p><strong>Пантотенската киселина е градбен камен на Коензим А (CoA)</strong> — молекула која е во центарот на буквално целиот метаболизам. CoA учествува во метаболизмот на јаглехидрати, масти И протеини истовремено.</p>
<p>CoA е неопходен за <strong>синтеза на стероидни хормони</strong> — тестостерон, кортизол, естроген. Без доволно Б5, производството на хормони страда. Исто така е клучен за синтеза на <strong>хемоглобин</strong> и антитела.</p>
<p>Важна улога игра и во синтеза на <strong>ацетилхолин</strong> — невротрансмитер за меморија и концентрација. Затоа дефицитот може да предизвика "мозочна магла".</p>
<p>Во козметиката, провитамин Б5 (пантенол) се користи за хидрација и заздравување на кожата — продира длабоко и ја задржува влагата.</p>`,
    foods:['Пилешко дроб 🫀','Авокадо 🥑','Печурки 🍄','Лосос 🐟','Јогурт','Сончогледово семе'],
    rda:'5 mg/ден', ula:'Нема утврдена', form:'Водено растворлив',
    syms:['Парестезии — трнење и жарење во стапала','Хроничен замор без причина','Раздразливост и промени во расположение','Проблеми со заспивање','Гадење и болки во стомак'],
    tip:'Пантенол во козметиката е провитамин Б5 — го хидрира и го забрзува заздравувањето на кожата.',
    timing:{when:'🌅 Наутро — со појадок',withFood:'Зема со кој било оброк. Авокадо, јогурт или јајца се идеален спој со природен Б5.',avoid:'Нема строги ограничувања. Избегнувај прекумерен кофеин кој го зголемува излачувањето на Б витамини.'}
  },
  {
    type:'vitamin',icon:'🟤',name:'Витамин Б6',alias:'Пиридоксин',
    desc:`<p><strong>Витамин Б6 учествува во повеќе од 100 ензимски реакции</strong>, главно поврзани со метаболизам на аминокиселини — градбените блокови на протеините. Без Б6, протеините не можат правилно да се метаболизираат.</p>

let currentTab='all';
function setTab(t,el){currentTab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const grid=document.getElementById('grid');
  const f=DATA.filter(d=>{
    const mt=currentTab==='all'||d.type===currentTab;
    const mq=!q||d.name.toLowerCase().includes(q)||d.alias.toLowerCase().includes(q)||d.foods.some(x=>x.toLowerCase().includes(q));
    return mt&&mq;
  });
  if(!f.length){grid.innerHTML='<div class="empty"><div>🔍</div>Нема резултати</div>';return;}
  grid.innerHTML=f.map(d=>`<div class="card ${d.type}" onclick="openModal(${DATA.indexOf(d)})"><div class="card-icon">${d.icon}</div><div class="card-name">${d.name}</div><div class="card-alias">${d.alias}</div><span class="badge ${d.type}">${d.type==='vitamin'?'Витамин':d.type==='mineral'?'Минерал':'Масна кис.'}</span></div>`).join('');
}
function openModal(i){
  const d=DATA[i];
  const pc=d.type==='mineral'?'min':d.type==='acid'?'acid':'';
  document.getElementById('mIcon').textContent=d.icon;
  document.getElementById('mName').textContent=d.name;
  document.getElementById('mAlias').textContent=d.alias;
  let h=`
    <div class="section-label">Опис &amp; Дејство врз организмот</div>
    <div class="info-box">${d.desc}</div>
    <div class="section-label">Најдобри извори на храна</div>
    <div class="food-grid">${d.foods.map(f=>`<span class="food-pill ${pc}">${f}</span>`).join('')}</div>
    <div class="section-label">Дозирање</div>
    <div class="dose-row"><span class="dose-label">🎯 Дневна потреба (RDA)</span><span class="dose-val">${d.rda}</span></div>
    ${d.ula?`<div class="dose-row"><span class="dose-label">⛔ Горна граница</span><span class="dose-val">${d.ula}</span></div>`:''}
    ${d.form?`<div class="dose-row"><span class="dose-label">💊 Форма</span><span class="dose-val">${d.form}</span></div>`:''}`;
  if(d.timing){
    h+=`<div class="section-label">⏰ Кога и со што да се зема</div>
    <div class="timing-card neutral"><div class="timing-title neutral">🕐 Најдобро време</div><div class="timing-body">${d.timing.when}</div></div>
    <div class="timing-card good"><div class="timing-title good">✅ Зема со оваа храна</div><div class="timing-body">${d.timing.withFood}</div></div>
    <div class="timing-card bad"><div class="timing-title bad">❌ Избегнувај во комбинација</div><div class="timing-body">${d.timing.avoid}</div></div>`;
  }
  h+=`<div class="section-label">Симптоми на дефицит</div><ul class="sym-list">${d.syms.map(s=>`<li>${s}</li>`).join('')}</ul>`;
  if(d.tip)h+=`<div class="section-label">💡 Совет</div><div class="tip-box">${d.tip}</div>`;
  if(d.warn)h+=`<div class="section-label">⚠️ Внимание</div><div class="tip-box warn">${d.warn}</div>`;
  document.getElementById('mBody').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.getElementById('modal').classList.remove('open');}
render();
</script>
